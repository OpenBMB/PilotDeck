<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 720" font-family="Inter, PingFang SC, sans-serif" font-size="11">
  <!-- Version Timeline — 横向时间轴，多家头部公司的版本发布节点 -->
  <!-- 设计：行=公司 (N≤8)，列=月度时间格 (24 个月)，节点=版本发布事件 -->
  <!-- 颜色：普通 release 圆点(gold)；major release 方块(blue)；deprecated ✕(red) -->

  <defs>
    <style>
      .bg { fill: #0F1115; }
      .panel { fill: #181B22; }
      .grid { stroke: #2A2E38; stroke-width: 0.5; }
      .axis { stroke: #3A3E48; stroke-width: 1; }
      .text-primary { fill: #E8E6E1; }
      .text-muted { fill: #8A8D96; }
      .text-gold { fill: #C9A87C; }
      .text-blue { fill: #4A90E2; }
      .release-dot { fill: #C9A87C; }
      .major-rect { fill: #4A90E2; }
      .deprecated { fill: #E07579; }
      .row-bg-even { fill: #14171E; }
      .row-bg-odd { fill: #181B22; }
      .title-serif { font-family: 'Playfair Display', 'Noto Serif SC', serif; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8A8D96"/>
    </marker>
  </defs>

  <rect width="1400" height="720" class="bg"/>

  <!-- Title -->
  <text x="48" y="50" class="text-gold title-serif" font-size="24" font-weight="600">Version Timeline</text>
  <text x="48" y="72" class="text-muted" font-size="12">{{INDUSTRY}} 头部公司近 24 个月版本演进 · 数据快照 {{AS_OF_DATE}}</text>

  <!-- X axis: months 0-23, plot area: x=200 to x=1320, y=110 to y=620 -->
  <!-- 月度网格 -->
  <g class="grid">
    <!-- 24 列纵向网格 -->
    <line x1="200" y1="110" x2="200" y2="620" class="axis"/>
    <line x1="247" y1="110" x2="247" y2="620"/>
    <line x1="293" y1="110" x2="293" y2="620"/>
    <line x1="340" y1="110" x2="340" y2="620"/>
    <line x1="387" y1="110" x2="387" y2="620"/>
    <line x1="433" y1="110" x2="433" y2="620"/>
    <line x1="480" y1="110" x2="480" y2="620"/>
    <line x1="527" y1="110" x2="527" y2="620"/>
    <line x1="573" y1="110" x2="573" y2="620"/>
    <line x1="620" y1="110" x2="620" y2="620"/>
    <line x1="667" y1="110" x2="667" y2="620"/>
    <line x1="713" y1="110" x2="713" y2="620"/>
    <line x1="760" y1="110" x2="760" y2="620"/>
    <line x1="807" y1="110" x2="807" y2="620"/>
    <line x1="853" y1="110" x2="853" y2="620"/>
    <line x1="900" y1="110" x2="900" y2="620"/>
    <line x1="947" y1="110" x2="947" y2="620"/>
    <line x1="993" y1="110" x2="993" y2="620"/>
    <line x1="1040" y1="110" x2="1040" y2="620"/>
    <line x1="1087" y1="110" x2="1087" y2="620"/>
    <line x1="1133" y1="110" x2="1133" y2="620"/>
    <line x1="1180" y1="110" x2="1180" y2="620"/>
    <line x1="1227" y1="110" x2="1227" y2="620"/>
    <line x1="1273" y1="110" x2="1273" y2="620"/>
    <line x1="1320" y1="110" x2="1320" y2="620" class="axis"/>
  </g>

  <!-- 月份标签（季度高亮） -->
  <g class="text-muted" font-size="10">
    <text x="200" y="100" text-anchor="middle">M-24</text>
    <text x="340" y="100" text-anchor="middle">M-21</text>
    <text x="480" y="100" text-anchor="middle">M-18</text>
    <text x="620" y="100" text-anchor="middle">M-15</text>
    <text x="760" y="100" text-anchor="middle">M-12</text>
    <text x="900" y="100" text-anchor="middle">M-9</text>
    <text x="1040" y="100" text-anchor="middle">M-6</text>
    <text x="1180" y="100" text-anchor="middle">M-3</text>
    <text x="1320" y="100" text-anchor="middle" class="text-gold" font-weight="600">今天</text>
  </g>

  <!-- 8 行公司轨道 -->
  <g>
    <rect x="60" y="115" width="1260" height="60" class="row-bg-even"/>
    <rect x="60" y="180" width="1260" height="60" class="row-bg-odd"/>
    <rect x="60" y="245" width="1260" height="60" class="row-bg-even"/>
    <rect x="60" y="310" width="1260" height="60" class="row-bg-odd"/>
    <rect x="60" y="375" width="1260" height="60" class="row-bg-even"/>
    <rect x="60" y="440" width="1260" height="60" class="row-bg-odd"/>
    <rect x="60" y="505" width="1260" height="60" class="row-bg-even"/>
    <rect x="60" y="570" width="1260" height="60" class="row-bg-odd"/>
  </g>

  <!-- 公司名 -->
  <g class="text-primary" font-size="13" font-weight="600">
    <text x="80" y="150">{{COMPANY_1}}</text>
    <text x="80" y="215">{{COMPANY_2}}</text>
    <text x="80" y="280">{{COMPANY_3}}</text>
    <text x="80" y="345">{{COMPANY_4}}</text>
    <text x="80" y="410">{{COMPANY_5}}</text>
    <text x="80" y="475">{{COMPANY_6}}</text>
    <text x="80" y="540">{{COMPANY_7}}</text>
    <text x="80" y="605">{{COMPANY_8}}</text>
  </g>

  <!-- 示例事件节点（数据点）— 注释每个 group 的语义 -->

  <!-- Company 1 timeline -->
  <g>
    <!-- 普通 release 圆点 -->
    <circle cx="430" cy="145" r="5" class="release-dot"><title>v1.0 · M-19 · 普通发布</title></circle>
    <text x="430" y="167" text-anchor="middle" class="text-muted" font-size="9">v1.0</text>
    <!-- major release 方块 -->
    <rect x="745" y="138" width="14" height="14" class="major-rect"><title>v2.0 · M-12 · 重大发布: 多模态全新架构</title></rect>
    <text x="752" y="167" text-anchor="middle" class="text-blue" font-size="9" font-weight="600">v2.0</text>
    <circle cx="990" cy="145" r="5" class="release-dot"><title>v2.5 · M-6</title></circle>
    <text x="990" y="167" text-anchor="middle" class="text-muted" font-size="9">v2.5</text>
    <circle cx="1200" cy="145" r="5" class="release-dot"><title>v2.7 · M-3</title></circle>
    <text x="1200" y="167" text-anchor="middle" class="text-gold" font-size="9" font-weight="600">v2.7 ←最新</text>
    <!-- Deprecated -->
    <text x="430" y="158" text-anchor="middle" class="deprecated" font-size="11" font-weight="700">×</text>
  </g>

  <!-- Company 2 timeline (示例) -->
  <g>
    <circle cx="295" cy="210" r="5" class="release-dot"/>
    <text x="295" y="232" text-anchor="middle" class="text-muted" font-size="9">v0.9</text>
    <rect x="568" y="203" width="14" height="14" class="major-rect"/>
    <text x="575" y="232" text-anchor="middle" class="text-blue" font-size="9" font-weight="600">v1.0 GA</text>
    <circle cx="900" cy="210" r="5" class="release-dot"/>
    <circle cx="1100" cy="210" r="5" class="release-dot"/>
    <rect x="1255" y="203" width="14" height="14" class="major-rect"/>
    <text x="1262" y="232" text-anchor="middle" class="text-gold" font-size="9" font-weight="600">v2.0 ←新</text>
  </g>

  <!-- Legend -->
  <g transform="translate(60, 660)">
    <circle cx="0" cy="0" r="5" class="release-dot"/>
    <text x="12" y="4" class="text-muted">普通版本</text>
    <rect x="100" y="-7" width="14" height="14" class="major-rect"/>
    <text x="120" y="4" class="text-muted">重大版本 (架构跃迁)</text>
    <text x="265" y="4" class="deprecated" font-weight="700">×</text>
    <text x="275" y="4" class="text-muted">已弃用</text>
    <text x="335" y="4" class="text-gold" font-weight="600">最新版本</text>
    <text x="420" y="4" class="text-muted">|  hover 节点查看版本号 / 发布日 / 主要变化</text>
  </g>

  <!-- 演进趋势注释（可选） -->
  <g transform="translate(800, 685)">
    <text x="0" y="0" class="text-muted" font-size="11">⚠ 重大版本发布密度 = 行业卷度；近 6 个月密度变化反映赛道阶段（爆发 / 成熟 / 收缩）</text>
  </g>

</svg>
