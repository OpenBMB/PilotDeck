<?xml version="1.0" encoding="UTF-8"?>
<!-- Porter 5 力雷达图。5 个轴各 0-5 分，分越高威胁越大 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" font-family="Inter, 'Noto Sans SC', sans-serif">
  <defs>
    <style>
      .bg { fill: #0F1115; }
      .grid { fill: none; stroke: #2A2A2E; stroke-width: 1; }
      .axis { stroke: #C9A87C; stroke-width: 1; }
      .label { fill: #E5E0D8; font-size: 13px; font-weight: 600; }
      .score-label { fill: #8B8680; font-size: 10px; }
      .data-area { fill: #C9A87C; fill-opacity: 0.35; stroke: #C9A87C; stroke-width: 2; }
      .data-point { fill: #C9A87C; }
      .title { fill: #E5E0D8; font-size: 22px; font-family: 'Playfair Display', serif; }
      .subtitle { fill: #8B8680; font-size: 12px; }
      .verdict { fill: #4A90E2; font-size: 14px; font-style: italic; }
    </style>
  </defs>

  <rect class="bg" width="900" height="700"/>

  <text class="title" x="40" y="50">{{INDUSTRY_NAME}} Porter 五力</text>
  <text class="subtitle" x="40" y="72">数据截止 {{AS_OF_DATE}} · 1=威胁低 / 5=威胁高</text>

  <!-- 中心点 (450, 380), 半径 220 -->
  <!-- 5 级刻度同心多边形（正五边形） -->
  <!-- 五边形顶点角度：-90, -18, 54, 126, 198 度 -->
  <!-- 1/5: r=44, 2/5: r=88, 3/5: r=132, 4/5: r=176, 5/5: r=220 -->

  <!-- Level 1 -->
  <polygon class="grid" points="450,336 491.84,348.59 475.91,388.96 424.09,388.96 408.16,348.59"/>
  <text class="score-label" x="452" y="346">1</text>
  <!-- Level 2 -->
  <polygon class="grid" points="450,292 533.68,317.18 501.83,397.92 398.17,397.92 366.32,317.18"/>
  <!-- Level 3 -->
  <polygon class="grid" points="450,248 575.51,285.78 527.74,406.88 372.26,406.88 324.49,285.78"/>
  <!-- Level 4 -->
  <polygon class="grid" points="450,204 617.35,254.37 553.66,415.85 346.34,415.85 282.65,254.37"/>
  <!-- Level 5（外圈）-->
  <polygon class="grid" points="450,160 659.19,222.96 579.57,424.81 320.43,424.81 240.81,222.96" style="stroke: #C9A87C; stroke-opacity: 0.5;"/>

  <!-- 5 个轴 -->
  <line class="axis" x1="450" y1="380" x2="450" y2="160"/>
  <line class="axis" x1="450" y1="380" x2="659.19" y2="222.96"/>
  <line class="axis" x1="450" y1="380" x2="579.57" y2="424.81"/>
  <line class="axis" x1="450" y1="380" x2="320.43" y2="424.81"/>
  <line class="axis" x1="450" y1="380" x2="240.81" y2="222.96"/>

  <!-- 轴标签 -->
  <text class="label" x="450" y="140" text-anchor="middle">现有竞争 ({{SCORE_RIVALRY}})</text>
  <text class="label" x="679" y="200" text-anchor="start">替代品威胁 ({{SCORE_SUBSTITUTE}})</text>
  <text class="label" x="599" y="450" text-anchor="start">客户议价力 ({{SCORE_BUYER}})</text>
  <text class="label" x="300" y="450" text-anchor="end">供应商议价 ({{SCORE_SUPPLIER}})</text>
  <text class="label" x="220" y="200" text-anchor="end">新进入威胁 ({{SCORE_ENTRY}})</text>

  <!-- 数据多边形（占位 3, 4, 3, 2, 3）-->
  <!-- 计算：顶点 = center + r * direction，r = score/5 * 220 -->
  <!-- 现在画一个示例：3/4/3/2/3 -->
  <polygon class="data-area" points="450,248 617.35,254.37 527.74,406.88 398.17,397.92 366.32,317.18"
           opacity="0.5"/>
  <circle class="data-point" cx="450" cy="248" r="4"/>
  <circle class="data-point" cx="617.35" cy="254.37" r="4"/>
  <circle class="data-point" cx="527.74" cy="406.88" r="4"/>
  <circle class="data-point" cx="398.17" cy="397.92" r="4"/>
  <circle class="data-point" cx="366.32" cy="317.18" r="4"/>

  <!-- 结论 -->
  <text class="verdict" x="40" y="640">综合判定：{{VERDICT}}</text>
  <text class="subtitle" x="40" y="664">高风险维度：{{HIGH_RISK}} · 主要护城河：{{MOAT}}</text>
</svg>
